<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>YAWATA CASINO</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
   <style>
:root {
    --bg-dark: #0f0f0f;
    --bg-panel: #1a1a1a;
    --grad-start: #0088aa;
    --grad-end: #005500;
    --text-green: #00aa66;
    --accent-gold: #b58900;
    --text-main: #e0e0e0;
    --border-main: #333;
}

/* ============================
   1. 全体：炎の世界観
============================ */
* {
    box-sizing: border-box;
    font-family: 'Consolas', 'Monaco', 'Courier New', monospace !important;
}

body {
    margin: 0;
    min-height: 100vh;
    color: var(--text-main);
    display: flex;
    flex-direction: column;
    align-items: center;
    letter-spacing: 0.05em;

    /* 🔥 炎のゆらぎ背景 */
    background: radial-gradient(circle at bottom,
        #2b0d00 0%, #0f0a05 50%, #000 100%);
    animation: flame-bg 6s ease-in-out infinite alternate;
}

@keyframes flame-bg {
    0% { background-position: 50% 100%; }
    100% { background-position: 50% 120%; }
}

/* 🔥 火の粉レイヤー（金玉地獄・脱出版） */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: -1; /* これでログイン画面の下に潜り込ませる */
    
    /* 粒の数を減らし、一つ一つを「光の粉」にする */
    background-image: 
        radial-gradient(1px 1px at 10% 20%, rgba(255, 150, 0, 0.8), transparent),
        radial-gradient(2px 2px at 50% 50%, rgba(255, 100, 0, 0.5), transparent),
        radial-gradient(1.5px 1.5px at 80% 80%, rgba(255, 200, 0, 0.6), transparent);
    
    background-size: 1000px 1000px; /* ここを巨大にするのがポイント！ */
    animation: sparks 20s linear infinite;
    opacity: 0.6;
}

@keyframes sparks {
    0% { transform: translateY(0); }
    100% { transform: translateY(-1000px); }
}

/* ログイン画面を全画面で一番上に持ってくる */
.login-section {
    position: fixed; /* 画面に固定 */
    inset: 0;        /* 上下左右0px（全画面） */
    z-index: 9999;   /* 何よりも上に表示 */
    background: var(--bg-dark) !important; /* 背景を真っ暗にして下を隠す */
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 !important; /* 余計な隙間を消す */
}

/* ログインに成功して非表示（display: none）になったら、下のゲームが出る */

/* ゲーム画面全体を整える */
main {
    width: 100%;
    max-width: 1200px;
    display: flex;
    flex-direction: row; /* 横並びにするならこれ */
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
}
/* ============================
   2. パネル・カード
============================ */
.section, .game-card, .chat-section, .crash-card, .roulette-card {
    background: rgba(20, 10, 5, 0.85) !important;
    border: 1px solid var(--border-main) !important;

    /* 🔥 炎の縁取り */
    border-top: 3px solid transparent !important;
    border-image: linear-gradient(
        to right,
        rgba(255,80,0,1),
        rgba(255,160,0,0.9),
        rgba(255,80,0,1)
    ) 1 !important;

    border-radius: 6px;
    padding: 25px !important;
    margin: 15px !important;
    width: 100% !important;
    max-width: 400px;

    /* 🔥 熱気の影 */
    box-shadow: 0 10px 40px rgba(255,80,0,0.25);
}

/* ============================
   3. タイトル
============================ */
h1, h2, .section-title {
    font-size: 1.3rem !important;
    font-weight: bold;
    text-transform: uppercase;
    margin-bottom: 20px !important;

    /* 🔥 炎の光 */
    background: linear-gradient(to right, #ffb300, #ff3b00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 10px rgba(255,120,0,0.4);
}

/* ============================
   4. ゲーム UI
============================ */

/* --- トランプカード --- */
.card-row {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 20px 0;
    min-height: 100px;
}

.card-ui {
    width: 65px;
    height: 95px;
    background: #1a0c07 !important;
    border: 1px solid transparent !important;

    /* 🔥 炎の縦グラデ */
    border-image: linear-gradient(to bottom, #ff6a00, #3a0d00) 1 !important;

    color: #fff !important;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    font-weight: bold;
    border-radius: 4px;
    box-shadow: 0 0 12px rgba(255,80,0,0.3);
}

.card-ui.red { color: #ff4d6a !important; }
.card-ui.back {
    background: #110700 !important;
    color: #ff6a00 !important;
}

/* --- スロットリール --- */
.slot-frame {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin: 25px 0;
}

.slot-frame div {
    width: 80px;
    height: 80px;
    background: #1a0c07 !important;
    border: 1px solid transparent !important;
    border-image: linear-gradient(to bottom, #ff6a00, #3a0d00) 1 !important;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.5rem;
    border-radius: 8px;
    box-shadow: 0 0 15px rgba(255,80,0,0.3);
}

/* --- ルーレット外枠：JSの書き換えを許可しつつデザインを維持 --- */
#roulette-wheel {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    
    /* JSが backgroundColor を変えた時、この transition で滑らかに光ります */
    transition: all 0.2s ease-in-out;
    
    display: flex;
    align-items: center;
    justify-content: center;
    
    /* デフォルトの状態（炎のベースカラー） */
    background-color: #1a0c07;
    border: 3px solid #ff6a00;
    box-shadow: 0 0 20px rgba(255,80,0,0.4);
}

/* JSが .style.backgroundColor を直接書き換える場合、
   ブラウザはインラインスタイルとして処理します。
   以下の設定により、文字色などは自動で読みやすく固定されます。
*/
#roulette-ball {
    font-size: 2.5rem;
    font-weight: bold;
    color: #ffffff !important;
    text-shadow: 0 0 10px rgba(0,0,0,0.8);
}

/* ============================
   5. 入力フォーム
============================ */
input[type="number"], input[type="text"], input[type="password"] {
    background: #1a0c07 !important;
    border: 1px solid #442a1a !important;
    color: #ffdd99 !important;
    padding: 12px !important;
    margin: 10px 0 !important;
    width: 100% !important;
    outline: none;
    font-size: 1rem;
    box-shadow: 0 0 8px rgba(255,120,0,0.2);
}

/* ============================
   6. ボタン
============================ */
button, .btn-primary {
    background: rgba(50,20,0,0.4) !important;
    color: #fff !important;
    border: 1px solid transparent !important;

    /* 🔥 炎の縁取り */
    border-image: linear-gradient(to bottom right, #ff6a00, #ffb300) 1 !important;

    padding: 15px !important;
    font-weight: bold;
    cursor: pointer;
    text-transform: uppercase;
    width: 100% !important;
    margin: 8px 0 !important;
    transition: all 0.2s;
}

button:hover {
    background: rgba(255,80,0,0.25) !important;
    box-shadow: 0 0 15px rgba(255,120,0,0.6);
    transform: translateY(-2px);
}

.btn-cashout, .bet-btn.red {
    border-image: linear-gradient(to bottom right, var(--accent-gold), #ff8800) 1 !important;
    color: var(--accent-gold) !important;
}

/* ============================
   7. チャット
============================ */
#chat-log {
    background: #120700 !important;
    height: 350px !important;
    padding: 15px !important;
    overflow-y: auto;
    border: 1px solid #442a1a !important;
    box-shadow: inset 0 0 10px rgba(255,80,0,0.2);
}

.msg-box {
    margin: 8px 0;
    padding: 10px;
    border-radius: 4px;
    font-size: 0.9rem;
}

.msg-me {
    border-left: 3px solid #ff6a00;
    background: rgba(255,120,0,0.15);
    color: #fff;
}

.msg-other {
    border-left: 3px solid #663300;
    background: #1a0c07;
    color: #ffddbb;
}

/* ============================
   8. ヘッダー・メイン
============================ */
header {
    margin-top: 50px; /* 火の粉に被らないよう少し下げる */
    z-index: 10;
}

#chipBar {
    border-bottom: 2px solid transparent;
    border-image: linear-gradient(to right, #ff6a00, #ffb300) 1;
    display: inline-block;
    padding: 10px 25px;
}

#chips {
    color: #ff6a00;
    font-size: 1.6rem;
    font-weight: bold;
}

main {
    width: 100%;
    max-width: 1200px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
    padding: 20px;
}

.chat-section {
    max-width: 1000px !important;
    flex: 1 1 100%;
}

/* ============================
   9. 結果表示
============================ */
.result {
    font-weight: bold;
    margin: 10px 0;
    font-size: 1.1rem;
}

.win { color: #ffb300; }
.lose { color: #ff4d6a; }
</style>
</head>
<body>

    <div class="section" style="width:320px; border-top: 4px solid var(--accent-green); background: #1a1a1a;">

<header>

<main>

<style>
    .game-card { background: #1a1a1a; border: 2px solid #333; border-radius: 15px; padding: 20px; margin: 10px; text-align: center; color: white; }

<div id="log" style="width:100%; padding:20px; font-size:0.8rem; color:rgba(0,255,255,0.4); border-top:1px solid rgba(0,255,255,0.1);"></div>

<script>

    const socket = io();
    let myName = ""; // ← これを追加！(今は空っぽだけど、ログインした時に自分の名前が入る箱です)

// 1. チップ表示（HTMLの id="chips" に合わせました）
function updateChips(amount) {
    const el = document.getElementById('chips');
    if (el && amount !== undefined) {
        el.textContent = amount;
    }
}

// 2. ログイン（HTMLの id="uName", id="uPass" に合わせました）
function login() {
    const name = document.getElementById('uName').value;
    const password = document.getElementById('uPass').value;
    const err = document.getElementById('err');
    
    if(!name || !password) {
        err.textContent = "名前とパスワードを入力してください";
        return;
    }
    socket.emit('login_request', { name: name, password: password });
}

socket.on('login_success', d => {
    myName = d.name; // ← これを追加！(ここで自分の名前を「箱」に保存します)
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('myName').textContent = d.name;
    document.getElementById('bankBalance').textContent = d.bank || 0;
    updateChips(d.chips);
});

socket.on('login_error', msg => {
    document.getElementById('err').textContent = msg;
});

    let score = 0;

function showGame(mode) {
    // 演出用のフラッシュ要素を一時的に作成
    const flash = document.createElement('div');
    flash.className = 'sparkle-flash';
    document.body.appendChild(flash);
    
    // 0.5秒かけて真っ白に光らせるアニメーション
    flash.style.animation = "flash-anim 0.8s ease-out";

    setTimeout(() => {
        const clickerArea = document.getElementById('clicker-area');
        const menuScreen = document.getElementById('menu-screen');
        const casinoArea = document.getElementById('casino-area'); // カジノ全体を囲むIDが必要

        if (mode === 'clicker') {
            document.body.classList.add('clicker-mode');
            if(clickerArea) clickerArea.style.display = 'block';
            if(menuScreen) menuScreen.style.display = 'none';
            if(casinoArea) casinoArea.style.display = 'none';
        } else {
            document.body.classList.remove('clicker-mode');
            if(clickerArea) clickerArea.style.display = 'none';
            if(menuScreen) menuScreen.style.display = 'block';
            if(casinoArea) casinoArea.style.display = 'none';
        }
    }, 400); // 光が最大になったタイミングで画面を切り替える

    setTimeout(() => flash.remove(), 800); // 終わったら消す
}
    
function hitClicker() {
    score++;
    document.getElementById('click-score').textContent = score;
    // クリック時も少しきらきらさせる
    createSparkles();
}

function createSparkles() {
    for(let i=0; i<15; i++) {
        const s = document.createElement('div');
        s.className = 'sparkle';
        s.style.left = Math.random() * window.innerWidth + 'px';
        s.style.top = Math.random() * window.innerHeight + 'px';
        document.body.appendChild(s);
        setTimeout(() => s.remove(), 600);
    }
}

function exchangeScore() {
    if (score < 100) return alert("100スコア以上必要です");
    socket.emit('exchange_request', { score });
    score = 0;
    document.getElementById('click-score').textContent = score;
}

socket.on('exchange_success', (d) => {
    alert(`換金成功！ ${d.addedChips} チップ獲得！`);
});

// 3. チャット（HTMLの id="chatInput", id="log" に合わせました）
function sendChat() {
    const input = document.getElementById('chatInput');
    if (input.value) {
        socket.emit('chat_message', input.value);
        input.value = '';
    }
}

socket.on('broadcast', (data) => {
    const chatLog = document.getElementById('chat-log');
    const isMe = (data.userName === myName);
    
    const infoDiv = document.createElement('div');
    infoDiv.className = "msg-info";
    
    // ✅ 名前の横に [債務者] を出す判定
    let displayName = isMe ? "あなた" : data.userName;
    if (data.isDebtor) {
        displayName += ' <span style="color:#ff4d6a; font-weight:bold; margin-left:5px;">[債務者]</span>';
    }
    infoDiv.innerHTML = displayName; // innerHTMLを使うことでタグを有効にする

    const msgDiv = document.createElement('div');
    msgDiv.className = isMe ? "msg-box msg-me" : "msg-box msg-other";
    msgDiv.textContent = data.message;

    chatLog.appendChild(infoDiv);
    chatLog.appendChild(msgDiv);
    chatLog.scrollTop = chatLog.scrollHeight;
});

let finalResult = ["🍒", "💎", "7️⃣"]; // サーバーからの結果を格納
let intervals = [null, null, null];    // シャッフル用タイマー
let isSpinning = [false, false, false]; // 回転フラグ

const symbols = ["🍒", "💎", "7️⃣", "🍋", "⭐", "🔔"];

// スピン開始
function spin() {
    const bet = parseInt(document.getElementById('sBet').value) || 10;
    
    // UIのリセット
    document.getElementById('spinBtn').disabled = true;
    document.getElementById('sRes').textContent = "";
    document.getElementById('gogoLamp').style.color = "#222";
    document.getElementById('gogoLamp').style.textShadow = "none";

    socket.emit('spin_request', { bet: bet });
}

// サーバーから結果が届いた
socket.on('spin_result', d => {
    finalResult = d.result; // 結果を保存しておく（まだ表示しない）

    // 3つのリールを回転（シャッフル）させる
    for (let i = 0; i < 3; i++) {
        isSpinning[i] = true;
        document.getElementById(`stop${i}`).disabled = false;
        
        // シャッフル演出開始
        intervals[i] = setInterval(() => {
            document.getElementById(`reel${i}`).textContent = symbols[Math.floor(Math.random() * symbols.length)];
        }, 60);
    }
    
    // 全リールが止まった後の処理用にデータだけ保持
    window.lastSpinData = d;
});

// 各停止ボタンを押した時
function stopReel(idx) {
    if (!isSpinning[idx]) return;

    clearInterval(intervals[idx]); // シャッフル停止
    document.getElementById(`reel${idx}`).textContent = finalResult[idx]; // 本物の結果を表示
    document.getElementById(`stop${idx}`).disabled = true;
    isSpinning[idx] = false;

    // 全部止まったか確認
    if (!isSpinning.includes(true)) {
        finishSpin();
    }
}

// 全リール停止後の処理
function finishSpin() {
    const d = window.lastSpinData;
    document.getElementById('spinBtn').disabled = false;
    updateChips(d.newChips);

    // WIN/LOSE表示
    const res = document.getElementById('sRes');
    res.textContent = d.win > 0 ? `WIN: ${d.win}枚！` : "LOSE";
    res.className = "result " + (d.win > 0 ? "win" : "lose");

    // 1/50のペカり演出（777の時）
    if (finalResult.every(s => s === "7️⃣")) {
        const lamp = document.getElementById('gogoLamp');
        lamp.style.color = "#ff00ff";
        lamp.style.textShadow = "0 0 10px #fff, 0 0 20px #ff00ff";
        // ボーナス確定のSEやバイブをここに入れてもいいですね！
    }
}
    
// 5. ブラックジャック（HTMLの id="bjDCards", id="bjPCards", id="bjPScore" に合わせました）
function startBJ() {
    const bet = parseInt(document.getElementById('bjBet').value) || 100;
    socket.emit('bj_start', { bet: bet });
    document.getElementById('bjInit').style.display = 'none';
    document.getElementById('bjActions').style.display = 'flex';
    document.getElementById('bjRes').textContent = "勝負中...";
}

function standBJ() {
    socket.emit('bj_stand');
}

socket.on('bj_update', d => {
    renderCards('bjPCards', d.player);
    renderCards('bjDCards', d.dealer);
    document.getElementById('bjPScore').textContent = d.pSum;
});

socket.on('bj_result', d => {
    renderCards('bjPCards', d.player);
    renderCards('bjDCards', d.dealer);
    const res = document.getElementById('bjRes');
    res.textContent = d.msg;
    res.className = "result " + (d.msg.includes("WIN") ? "win" : "lose");

    updateChips(d.newChips);
    document.getElementById('bjInit').style.display = 'flex';
    document.getElementById('bjActions').style.display = 'none';
});

// 6. ハイアンドロー（HTMLの id="hlCurrent", id="hlNext" に合わせました）
function startHL() {
    const betVal = parseInt(document.getElementById('hlBet').value) || 100;
    socket.emit('hl_start', { bet: betVal }); 
}

// guessHL をこれに書き換え（betを送る必要はないのでシンプルにする）
function guessHL(choice) {
    socket.emit('hl_guess', { choice: choice });
}

function collectHL() {
    socket.emit('hl_collect');
    document.getElementById('hlInit').style.display = 'flex';
    document.getElementById('hlActions').style.display = 'none';
}

// hl_setup（最初の1枚）が届いた時
socket.on('hl_setup', d => {
    renderCards('hlCurrent', [d.currentCard]); 
    document.getElementById('hlInit').style.display = 'none';
    document.getElementById('hlActions').style.display = 'flex';
    document.getElementById('hlRes').textContent = "HIGH or LOW?";
    
    // ✅ 最初の1枚の時はコレクトボタンを隠す（または無効化）
    document.querySelector("button[onclick='collectHL()']").style.opacity = "0.3";
    document.querySelector("button[onclick='collectHL()']").disabled = true;
});

socket.on('hl_result', d => {
    // 安全装置：カードデータがある時だけ描画（これで rank undefined エラーを阻止）
    if (d.oldCard) {
        renderCards('hlCurrent', [d.oldCard]); 
    }

    const res = document.getElementById('hlRes');
    res.textContent = d.msg;
    
    // d.win が true なら継続、false なら終了
    if (d.win === true) {
        res.className = "result win"; // 勝利（青/緑）
        const collectBtn = document.querySelector("button[onclick='collectHL()']");
        if(collectBtn) {
            collectBtn.style.opacity = "1";
            collectBtn.disabled = false;
        }
    } else {
        res.className = "result lose"; // 敗北（赤）
        document.getElementById('hlInit').style.display = 'flex';
        document.getElementById('hlActions').style.display = 'none';
        
        const collectBtn = document.querySelector("button[onclick='collectHL()']");
        if(collectBtn) {
            collectBtn.style.opacity = "0.3";
            collectBtn.disabled = true;
        }
    }

    if(d.newChips !== undefined) updateChips(d.newChips);
});

let isCrashing = false;
let currentMult = 1.0;
let crashInt;

// --- CRASH ---
function handleCrashAction() {
    const btn = document.getElementById('crash-action-btn');
    const bet = parseInt(document.getElementById('crash-bet').value);

    if (!isCrashing) {
        // BETフェーズ
        if (!bet || bet <= 0) return alert("賭け金を入れて！");
        socket.emit('crash_bet', { bet });
        btn.innerText = "WAITING...";
        btn.disabled = true;
    } else {
        // CASHOUTフェーズ（利確！）
        socket.emit('crash_cashout', { bet, multiplier: currentMult });
        stopCrashLocal("利確成功！");
    }
}

socket.on('crash_start', ({ bet, crashPoint }) => {
    isCrashing = true;
    currentMult = 1.0;
    const btn = document.getElementById('crash-action-btn');
    btn.disabled = false;
    btn.innerText = "CASH OUT"; // ここで利確ボタンに変わる
    btn.classList.add('btn-cashout');

    crashInt = setInterval(() => {
        currentMult += 0.01;
        document.getElementById('crash-multiplier').innerText = currentMult.toFixed(2) + "x";

        if (currentMult >= crashPoint) {
            stopCrashLocal("💥 CRASHED!");
        }
    }, 100);
});

function stopCrashLocal(msg) {
    clearInterval(crashInt);
    isCrashing = false;
    const btn = document.getElementById('crash-action-btn');
    btn.innerText = "BET";
    btn.classList.remove('btn-cashout');
    document.getElementById('crash-status').innerText = msg;
}

function betR(type) {
    const betInput = document.getElementById('roulette-bet');
    const amount = parseInt(betInput.value);
    const numInput = document.getElementById('roulette-num'); // 追加

    if (isNaN(amount) || amount <= 0) return alert("賭け金を入力してください");

    // サーバーに送る「タイプ」を調整
    let sendType = type;
    if (type === 'number') {
        const chosenNum = parseInt(numInput.value);
        if (isNaN(chosenNum) || chosenNum < 0 || chosenNum > 36) return alert("0〜36の数字を入れてください");
        sendType = 'num_' + chosenNum; // サーバーが期待する形式 "num_21" 等にする
    }

    const ball = document.getElementById('roulette-ball');
    const wheel = document.getElementById('roulette-wheel');
    
    let count = 0;
    let timer = setInterval(() => {
        const tempNum = Math.floor(Math.random() * 37);
        ball.innerText = tempNum;
        if (count % 2 === 0) {
            wheel.style.setProperty('background-color', '#ff0000', 'important');
        } else {
            wheel.style.setProperty('background-color', '#000000', 'important');
        }
        count++;

        if (count > 20) {
            clearInterval(timer);
            // ★ここでサーバーに送信！
            socket.emit('roulette_bet', { bet: amount, type: sendType });
        }
    }, 50);
}

// 判定用の赤数字リスト（これがないと「赤」が判定できません）
const RED_NUMBERS = [1, 3, 5, 7, 9, 12, 14, 16, 18, 19, 21, 23, 25, 27, 30, 32, 34, 36];

socket.on('roulette_result', (data) => {
    const ball = document.getElementById('roulette-ball');
    const wheel = document.getElementById('roulette-wheel');
    const num = data.resultNumber;

    // 1. 数字を更新
    ball.innerText = num;

    // 2. 「見た目の色」と「枠」の処理（端折らず全部入り！）
    if (num === 0) {
        wheel.style.setProperty('background-color', '#008800', 'important');
        wheel.style.borderImage = "none"; 
        wheel.style.borderColor = "#00ff00";
    } else if (RED_NUMBERS.includes(num)) {
        wheel.style.setProperty('background-color', '#aa0000', 'important');
        wheel.style.borderImage = "none";
        wheel.style.borderColor = "#ff0000";
    } else {
        wheel.style.setProperty('background-color', '#000000', 'important');
        wheel.style.borderImage = "none";
        wheel.style.borderColor = "#444444";
    }

    // 3. 【重要】チップの更新処理（これが抜けていたから増えなかった）
    if (data.newChips !== undefined) {
        // 画面上のチップを表示している要素（例：#user-chips や #balance）を書き換える
        const chipEl = document.getElementById('user-chips') || document.getElementById('balance');
        if (chipEl) {
            chipEl.innerText = data.newChips;
        }
    }

    // 4. アラート（演出の最後に出る）
    if (data.isWin) {
        alert(`勝利！ ${data.payout}枚獲得！`);
    }
});
    
// 7. ランキング（HTMLの id="rList" に合わせました）
socket.on('update_ranking', list => {
    const container = document.getElementById('rList');
    if (!container) return;
    container.innerHTML = list.map((u, i) => `
        <div style="border-bottom: 1px solid rgba(0,255,255,0.1); padding: 5px 0;">
            <span style="color:var(--accent2)">${i + 1}.</span> ${u.name} 
            <span style="float:right; color:#fcee0a;">${u.chips}</span>
        </div>
    `).join('');
});

// 8. カード描画（HTMLの .card-ui デザインに合わせました）
function renderCards(id, cards) {
    const el = document.getElementById(id);
    if (!el) return;
    el.innerHTML = cards.map(c => {
        if (c.rank === '?') return `<div class="card-ui back">?</div>`;
        const isRed = c.suit === '♥' || c.suit === '♦';
        return `<div class="card-ui ${isRed ? 'red' : ''}">${c.rank}${c.suit}</div>`;
    }).join('');
}

socket.on('chat_history', (msgs) => {
    const chatLog = document.getElementById('chat-log');
    if (!chatLog) return;
    chatLog.innerHTML = ""; 

    msgs.forEach(data => {
        const isMe = (data.userName === myName);
        
        const infoDiv = document.createElement('div');
        infoDiv.className = "msg-info";
        
        let nameLabel = data.userName;
        if (data.isDebtor) {
            nameLabel += ' <span style="color:#ff4d6a; font-weight:bold; margin-left:5px;">[債務者]</span>';
        }
        infoDiv.innerHTML = nameLabel;

        const msgDiv = document.createElement('div');
        msgDiv.className = isMe ? "msg-box msg-me" : "msg-box msg-other";
        msgDiv.textContent = data.message || "表示エラー"; 

        chatLog.appendChild(infoDiv);
        chatLog.appendChild(msgDiv);
    });
    chatLog.scrollTop = chatLog.scrollHeight;
});
    
</script>
