<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>YAWATA CASINO</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
   <style>
:root {
    --bg-dark: #1a1a1a;       /* メイン背景：深いグレー */
    --bg-panel: #252525;      /* パネル背景：少し明るいグレー */
    --accent-green: #00ff00;  /* メインアクセント：蛍光緑 */
    --accent-gold: #ffaa00;   /* 利確・重要ボタン：オレンジゴールド */
    --text-main: #ffffff;
    --text-sub: #b0b0b0;
}

* { box-sizing: border-box; }

body {
    margin: 0;
    min-height: 100vh;
    background-color: #0f0f0f; /* ほぼ黒 */
    font-family: 'Inter', 'Segoe UI', sans-serif;
    color: var(--text-main);
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: background 0.5s ease;
}

/* --- クリッカーモード（白基調）も一応維持 --- */
body.clicker-mode { background-color: #f0f0f0 !important; color: #1a1a1a !important; }
body.clicker-mode .section { background: #fff !important; border: 1px solid #ddd !important; }

header { padding: 30px 10px; }
h1 {
    font-size: 2.2rem;
    font-weight: 900;
    color: var(--accent-green);
    text-transform: uppercase;
    letter-spacing: 4px;
    margin: 0;
}

/* チップ表示バー */
#chipBar {
    background: var(--bg-panel);
    padding: 10px 25px;
    border-radius: 8px;
    border-bottom: 3px solid var(--accent-green);
    margin-top: 15px;
    font-weight: bold;
    display: flex;
    align-items: center;
    gap: 15px;
}
#chips { font-size: 1.6rem; color: var(--accent-green); }

/* メインレイアウト：現在のクラッシュ風のカード形式 */
main {
    width: 100%;
    max-width: 1200px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
    padding: 20px;
}

/* すべてのゲームをこのスタイルに統一 */
.section {
    background: var(--bg-panel);
    border-radius: 12px;
    padding: 25px;
    min-width: 340px;
    flex: 1;
    display: flex;
    flex-direction: column;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    border: 1px solid #333;
}

.chat-section { flex: 1 1 100%; max-width: 1080px; }

/* 入力欄とボタンのモダンなデザイン */
input[type="number"], input[type="text"], input[type="password"] {
    background: #151515;
    border: 2px solid #333;
    border-radius: 6px;
    color: #fff;
    padding: 12px;
    margin: 5px 0;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
}
input:focus { border-color: var(--accent-green); }

button {
    background: var(--accent-green);
    color: #000;
    border: none;
    border-radius: 6px;
    padding: 14px;
    font-weight: 800;
    font-size: 1rem;
    cursor: pointer;
    transition: transform 0.1s, filter 0.2s;
    margin: 5px 0;
    text-transform: uppercase;
}
button:hover { filter: brightness(1.2); }
button:active { transform: scale(0.98); }

/* 利確ボタン（特別な色） */
.btn-cashout {
    background: var(--accent-gold) !important;
}

/* --- クラッシュ専用の強調 --- */
#crash-multiplier {
    font-size: 4rem;
    font-weight: 900;
    color: var(--accent-green);
    margin: 20px 0;
}

/* --- ルーレット専用の強調 --- */
#roulette-wheel {
    font-size: 2.5rem;
    background: #151515;
    border: 4px solid var(--accent-green);
    border-radius: 50%;
    width: 110px; height: 110px;
    line-height: 102px;
    margin: 15px auto;
}

/* --- チャット・BOTメッセージ --- */
#chat-log {
    background: #151515;
    border-radius: 8px;
    height: 380px;
    padding: 15px;
    overflow-y: auto;
    text-align: left;
    border: 1px solid #333;
}
.msg-box {
    margin: 8px 0;
    padding: 12px;
    border-radius: 8px;
    max-width: 80%;
    font-size: 14px;
    line-height: 1.5;
}
.msg-other { background: #2a2a2a; color: #eee; align-self: flex-start; }
.msg-me { background: var(--accent-green); color: #000; align-self: flex-end; font-weight: bold; }

/* BOT実況：目立つように公式メッセージ風に */
.msg-bot {
    align-self: center;
    background: rgba(255, 170, 0, 0.1);
    color: var(--accent-gold);
    border-left: 4px solid var(--accent-gold);
    width: 95%;
    padding: 10px;
    font-weight: bold;
    text-align: center;
}
</style>
</head>
<body>

<div id="loginOverlay">
    <div class="section" style="width:320px;">
        <h2 style="color:var(--accent);">LOGIN / SIGNUP</h2>
        <div style="margin-top:20px;">
            <input type="text" id="uName" placeholder="PLAYER NAME" style="width:100%; margin-bottom:10px;"><br>
            <input type="password" id="uPass" placeholder="PASSWORD" style="width:100%; margin-bottom:20px;"><br>
            <button onclick="login()" style="width:100%;">ACCESS SYSTEM</button>
            <p id="err" style="color:var(--accent2); font-size:0.8rem; margin-top:10px;"></p>
        </div>
    </div>
</div>

<header>
    <h1><span>YAWATA</span> CASINO</h1>
    <div id="chipBar">
        STATUS: <span id="chips">0</span> CHIPS
    </div>
    <div style="margin-top:10px; font-size:0.9rem;">PLAYER: <span id="myName">-</span></div>
</header>

<main>

    <a href="/public/index.html">
  <button class="menu-button">APMテストへ</button>
</a>

    <div class="section">
        <div class="section-title"><span class="label">Cyber Slot</span></div>
        <div id="gogoLamp" style="color: #222; font-weight: bold; font-size: 1.5rem;">GOGO!</div>
        <div class="slot-frame" style="display: flex; justify-content: center; gap: 10px;">
            <div id="reel0">❓</div>
            <div id="reel1">❓</div>
            <div id="reel2">❓</div>
        </div>
        <div class="control-row">
            <button id="stop0" onclick="stopReel(0)" disabled>STOP 1</button>
            <button id="stop1" onclick="stopReel(1)" disabled>STOP 2</button>
            <button id="stop2" onclick="stopReel(2)" disabled>STOP 3</button>
        </div>
        <div class="control-row">
            <input type="number" id="sBet" value="100" min="10">
            <button id="spinBtn" onclick="spin()">SPIN</button>
        </div>
        <div id="sRes" class="result"></div>
    </div>

    <div class="section">
        <div class="section-title"><span class="label">Blackjack</span></div>
        <div id="bjDCards" class="card-row"></div>
        <div id="bjPCards" class="card-row"></div>
        <div id="bjPScore" class="result">0</div>
        <div class="control-row" id="bjInit">
            <input type="number" id="bjBet" value="100">
            <button onclick="startBJ()">DEAL</button>
        </div>
        <div class="control-row" id="bjActions" style="display:none;">
            <button onclick="socket.emit('bj_hit')">HIT</button>
            <button onclick="standBJ()">STAND</button>
        </div>
        <div id="bjRes" class="result"></div>
    </div>

    <div class="section">
        <div class="section-title"><span class="label">High & Low</span></div>
        <div class="card-row">
            <div id="hlCurrent" class="card-ui">?</div>
            <div id="hlNext" class="card-ui back">?</div>
        </div>
        <div class="control-row" id="hlInit">
            <input type="number" id="hlBet" value="100">
            <button onclick="startHL()">DEAL</button>
        </div>
        <div class="control-row" id="hlActions" style="display:none;">
            <button onclick="guessHL('high')">HIGH</button>
            <button onclick="guessHL('low')">LOW</button>
            <button onclick="collectHL()">COLLECT</button>
        </div>
        <div id="hlRes" class="result"></div>
    </div>

    <div class="game-card crash-card">
    <h2>🚀 CRASH <span id="crash-status" style="font-size: 0.5em; color: #ff00ff;">READY</span></h2>
    <div class="crash-main">
        <div id="crash-multiplier">1.00x</div>
        <canvas id="crash-chart" width="300" height="150"></canvas>
    </div>
    <div class="controls">
        <input type="number" id="crash-bet" placeholder="賭け金">
        <button id="crash-action-btn" class="btn-primary" onclick="handleCrashAction()">BET</button>
    </div>
</div>

<hr>

<div class="game-card roulette-card">
    <h2>🎡 ROULETTE</h2>
    <div id="roulette-wheel">
        <div id="roulette-ball">?</div>
    </div>
    <div class="roulette-board">
        <div class="board-row">
            <button class="bet-btn red" onclick="betR('red')">RED (x2)</button>
            <button class="bet-btn black" onclick="betR('black')">BLACK (x2)</button>
        </div>
        <div class="board-row">
            <input type="number" id="roulette-num" min="0" max="36" placeholder="数字(0-36)">
            <button class="btn-primary" onclick="betR('number')">数字に賭ける (x36)</button>
        </div>
        <input type="number" id="roulette-bet" placeholder="賭け金">
    </div>
</div>

<style>
    .game-card { background: #1a1a1a; border: 2px solid #333; border-radius: 15px; padding: 20px; margin: 10px; text-align: center; color: white; }
    #crash-multiplier { font-size: 3rem; font-weight: bold; color: #00ff00; text-shadow: 0 0 10px #00ff00; margin: 10px 0; }
    .btn-primary { background: #00ff00; color: #000; font-weight: bold; padding: 15px 30px; border-radius: 5px; cursor: pointer; width: 100%; }
    .btn-cashout { background: #ffaa00; color: #000; } /* 利確ボタンの色 */
    
    /* ルーレット盤の装飾 */
    .bet-btn { padding: 10px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; width: 45%; }
    .red { background: #d40000; box-shadow: 0 4px #8b0000; }
    .black { background: #222; box-shadow: 0 4px #000; }
    #roulette-wheel { font-size: 2.5rem; background: #004d00; border: 5px solid #ffd700; border-radius: 50%; width: 100px; height: 100px; line-height: 100px; margin: 10px auto; }
</style>

    <div class="section">
    <div class="section-title"><span class="label">ATM / 闇金窓口</span></div>
    <div style="font-size: 1.4rem; margin: 10px 0;">BANK: <span id="bankBalance" style="color:#fcee0a;">0</span></div>
    <div class="control-row">
        <input type="number" id="atmAmount" value="500" step="100">
    </div>
    <div class="control-row">
        <button onclick="socket.emit('atm_request', {amount: parseInt(document.getElementById('atmAmount').value), type:'deposit'})">預ける</button>
        <button onclick="socket.emit('atm_request', {amount: parseInt(document.getElementById('atmAmount').value), type:'withdraw'})" style="color:#ff4d6a;">借りる/出す</button>
    </div>
</div>

    <div class="section">
        <div class="section-title"><span class="label">Ranking</span></div>
        <div id="rList"></div>
    </div>

    <div id="menu-screen" class="section">
    <h2>🎰 闇カジノ・メニュー</h2>
    <button onclick="showGame('casino')">カジノエリア（スロット/BJ）</button>
    <button onclick="showGame('clicker')" style="background: #fff; color: #000;">クリッカー（出稼ぎエリア）</button>
</div>

<div id="clicker-area" class="section" style="display:none; max-width: 600px; margin: 10px auto;">
    <div class="section-title"><span class="label">出稼ぎエリア</span></div>
    
    <h2 style="color: var(--accent); margin-top: 10px;">💰 出稼ぎクリッカー</h2>
    
    <div id="click-score" style="font-size: 3rem; margin: 15px 0; color: #fff; text-shadow: 0 0 10px var(--accent);">0</div>
    
    <div class="control-row">
        <button id="main-button" onclick="hitClicker()" style="width: 150px; height: 150px; border-radius: 50%; font-size: 1.5rem; background: #000; color: #fff; border: 3px solid var(--accent); cursor: pointer; box-shadow: 0 0 15px var(--accent);">
            PUSH!
        </button>
    </div>

    <br>

    <div class="control-row" style="gap: 15px;">
        <button onclick="exchangeScore()" style="background: #000; color: #fff; border: 1px solid #0ff; padding: 10px 20px;">
            チップへ換金(100:1)
        </button>
        <button onclick="showGame('menu')" style="background: #000; color: #fff; border: 1px solid #fff; padding: 10px 20px;">
            メニューへ戻る
        </button>
    </div>
</div>

    <div class="section chat-section">
        <div class="section-title"><span class="label">Global Chat</span></div>
        <div id="chat-log" style="height: 300px; background: #7494c0; border-radius: 8px; overflow-y: auto; margin: 10px 0;"></div>
        <div class="control-row">
            <input type="text" id="chatInput" placeholder="MESSAGE..." style="width:75%;">
            <button onclick="sendChat()">SEND</button>
        </div>
    </div>
</main>

<div id="log" style="width:100%; padding:20px; font-size:0.8rem; color:rgba(0,255,255,0.4); border-top:1px solid rgba(0,255,255,0.1);"></div>

<script>

    const socket = io();
    let myName = ""; // ← これを追加！(今は空っぽだけど、ログインした時に自分の名前が入る箱です)

// 1. チップ表示（HTMLの id="chips" に合わせました）
function updateChips(amount) {
    const el = document.getElementById('chips');
    if (el && amount !== undefined) {
        el.textContent = amount;
    }
}

// 2. ログイン（HTMLの id="uName", id="uPass" に合わせました）
function login() {
    const name = document.getElementById('uName').value;
    const password = document.getElementById('uPass').value;
    const err = document.getElementById('err');
    
    if(!name || !password) {
        err.textContent = "名前とパスワードを入力してください";
        return;
    }
    socket.emit('login_request', { name: name, password: password });
}

socket.on('login_success', d => {
    myName = d.name; // ← これを追加！(ここで自分の名前を「箱」に保存します)
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('myName').textContent = d.name;
    document.getElementById('bankBalance').textContent = d.bank || 0;
    updateChips(d.chips);
});

socket.on('login_error', msg => {
    document.getElementById('err').textContent = msg;
});

    let score = 0;

function showGame(mode) {
    // 演出用のフラッシュ要素を一時的に作成
    const flash = document.createElement('div');
    flash.className = 'sparkle-flash';
    document.body.appendChild(flash);
    
    // 0.5秒かけて真っ白に光らせるアニメーション
    flash.style.animation = "flash-anim 0.8s ease-out";

    setTimeout(() => {
        const clickerArea = document.getElementById('clicker-area');
        const menuScreen = document.getElementById('menu-screen');
        const casinoArea = document.getElementById('casino-area'); // カジノ全体を囲むIDが必要

        if (mode === 'clicker') {
            document.body.classList.add('clicker-mode');
            if(clickerArea) clickerArea.style.display = 'block';
            if(menuScreen) menuScreen.style.display = 'none';
            if(casinoArea) casinoArea.style.display = 'none';
        } else {
            document.body.classList.remove('clicker-mode');
            if(clickerArea) clickerArea.style.display = 'none';
            if(menuScreen) menuScreen.style.display = 'block';
            if(casinoArea) casinoArea.style.display = 'none';
        }
    }, 400); // 光が最大になったタイミングで画面を切り替える

    setTimeout(() => flash.remove(), 800); // 終わったら消す
}
    
function hitClicker() {
    score++;
    document.getElementById('click-score').textContent = score;
    // クリック時も少しきらきらさせる
    createSparkles();
}

function createSparkles() {
    for(let i=0; i<15; i++) {
        const s = document.createElement('div');
        s.className = 'sparkle';
        s.style.left = Math.random() * window.innerWidth + 'px';
        s.style.top = Math.random() * window.innerHeight + 'px';
        document.body.appendChild(s);
        setTimeout(() => s.remove(), 600);
    }
}

function exchangeScore() {
    if (score < 100) return alert("100スコア以上必要です");
    socket.emit('exchange_request', { score });
    score = 0;
    document.getElementById('click-score').textContent = score;
}

socket.on('exchange_success', (d) => {
    alert(`換金成功！ ${d.addedChips} チップ獲得！`);
});

// 3. チャット（HTMLの id="chatInput", id="log" に合わせました）
function sendChat() {
    const input = document.getElementById('chatInput');
    if (input.value) {
        socket.emit('chat_message', input.value);
        input.value = '';
    }
}

socket.on('broadcast', (data) => {
    const chatLog = document.getElementById('chat-log');
    const isMe = (data.userName === myName);
    
    const infoDiv = document.createElement('div');
    infoDiv.className = "msg-info";
    
    // ✅ 名前の横に [債務者] を出す判定
    let displayName = isMe ? "あなた" : data.userName;
    if (data.isDebtor) {
        displayName += ' <span style="color:#ff4d6a; font-weight:bold; margin-left:5px;">[債務者]</span>';
    }
    infoDiv.innerHTML = displayName; // innerHTMLを使うことでタグを有効にする

    const msgDiv = document.createElement('div');
    msgDiv.className = isMe ? "msg-box msg-me" : "msg-box msg-other";
    msgDiv.textContent = data.message;

    chatLog.appendChild(infoDiv);
    chatLog.appendChild(msgDiv);
    chatLog.scrollTop = chatLog.scrollHeight;
});

let finalResult = ["🍒", "💎", "7️⃣"]; // サーバーからの結果を格納
let intervals = [null, null, null];    // シャッフル用タイマー
let isSpinning = [false, false, false]; // 回転フラグ

const symbols = ["🍒", "💎", "7️⃣", "🍋", "⭐", "🔔"];

// スピン開始
function spin() {
    const bet = parseInt(document.getElementById('sBet').value) || 10;
    
    // UIのリセット
    document.getElementById('spinBtn').disabled = true;
    document.getElementById('sRes').textContent = "";
    document.getElementById('gogoLamp').style.color = "#222";
    document.getElementById('gogoLamp').style.textShadow = "none";

    socket.emit('spin_request', { bet: bet });
}

// サーバーから結果が届いた
socket.on('spin_result', d => {
    finalResult = d.result; // 結果を保存しておく（まだ表示しない）

    // 3つのリールを回転（シャッフル）させる
    for (let i = 0; i < 3; i++) {
        isSpinning[i] = true;
        document.getElementById(`stop${i}`).disabled = false;
        
        // シャッフル演出開始
        intervals[i] = setInterval(() => {
            document.getElementById(`reel${i}`).textContent = symbols[Math.floor(Math.random() * symbols.length)];
        }, 60);
    }
    
    // 全リールが止まった後の処理用にデータだけ保持
    window.lastSpinData = d;
});

// 各停止ボタンを押した時
function stopReel(idx) {
    if (!isSpinning[idx]) return;

    clearInterval(intervals[idx]); // シャッフル停止
    document.getElementById(`reel${idx}`).textContent = finalResult[idx]; // 本物の結果を表示
    document.getElementById(`stop${idx}`).disabled = true;
    isSpinning[idx] = false;

    // 全部止まったか確認
    if (!isSpinning.includes(true)) {
        finishSpin();
    }
}

// 全リール停止後の処理
function finishSpin() {
    const d = window.lastSpinData;
    document.getElementById('spinBtn').disabled = false;
    updateChips(d.newChips);

    // WIN/LOSE表示
    const res = document.getElementById('sRes');
    res.textContent = d.win > 0 ? `WIN: ${d.win}枚！` : "LOSE";
    res.className = "result " + (d.win > 0 ? "win" : "lose");

    // 1/50のペカり演出（777の時）
    if (finalResult.every(s => s === "7️⃣")) {
        const lamp = document.getElementById('gogoLamp');
        lamp.style.color = "#ff00ff";
        lamp.style.textShadow = "0 0 10px #fff, 0 0 20px #ff00ff";
        // ボーナス確定のSEやバイブをここに入れてもいいですね！
    }
}
    
// 5. ブラックジャック（HTMLの id="bjDCards", id="bjPCards", id="bjPScore" に合わせました）
function startBJ() {
    const bet = parseInt(document.getElementById('bjBet').value) || 100;
    socket.emit('bj_start', { bet: bet });
    document.getElementById('bjInit').style.display = 'none';
    document.getElementById('bjActions').style.display = 'flex';
    document.getElementById('bjRes').textContent = "勝負中...";
}

function standBJ() {
    socket.emit('bj_stand');
}

socket.on('bj_update', d => {
    renderCards('bjPCards', d.player);
    renderCards('bjDCards', d.dealer);
    document.getElementById('bjPScore').textContent = d.pSum;
});

socket.on('bj_result', d => {
    renderCards('bjPCards', d.player);
    renderCards('bjDCards', d.dealer);
    const res = document.getElementById('bjRes');
    res.textContent = d.msg;
    res.className = "result " + (d.msg.includes("WIN") ? "win" : "lose");

    updateChips(d.newChips);
    document.getElementById('bjInit').style.display = 'flex';
    document.getElementById('bjActions').style.display = 'none';
});

// 6. ハイアンドロー（HTMLの id="hlCurrent", id="hlNext" に合わせました）
function startHL() {
    const betVal = parseInt(document.getElementById('hlBet').value) || 100;
    socket.emit('hl_start', { bet: betVal }); 
}

// guessHL をこれに書き換え（betを送る必要はないのでシンプルにする）
function guessHL(choice) {
    socket.emit('hl_guess', { choice: choice });
}

function collectHL() {
    socket.emit('hl_collect');
    document.getElementById('hlInit').style.display = 'flex';
    document.getElementById('hlActions').style.display = 'none';
}

// hl_setup（最初の1枚）が届いた時
socket.on('hl_setup', d => {
    renderCards('hlCurrent', [d.currentCard]); 
    document.getElementById('hlInit').style.display = 'none';
    document.getElementById('hlActions').style.display = 'flex';
    document.getElementById('hlRes').textContent = "HIGH or LOW?";
    
    // ✅ 最初の1枚の時はコレクトボタンを隠す（または無効化）
    document.querySelector("button[onclick='collectHL()']").style.opacity = "0.3";
    document.querySelector("button[onclick='collectHL()']").disabled = true;
});

socket.on('hl_result', d => {
    // 安全装置：カードデータがある時だけ描画（これで rank undefined エラーを阻止）
    if (d.oldCard) {
        renderCards('hlCurrent', [d.oldCard]); 
    }

    const res = document.getElementById('hlRes');
    res.textContent = d.msg;
    
    // d.win が true なら継続、false なら終了
    if (d.win === true) {
        res.className = "result win"; // 勝利（青/緑）
        const collectBtn = document.querySelector("button[onclick='collectHL()']");
        if(collectBtn) {
            collectBtn.style.opacity = "1";
            collectBtn.disabled = false;
        }
    } else {
        res.className = "result lose"; // 敗北（赤）
        document.getElementById('hlInit').style.display = 'flex';
        document.getElementById('hlActions').style.display = 'none';
        
        const collectBtn = document.querySelector("button[onclick='collectHL()']");
        if(collectBtn) {
            collectBtn.style.opacity = "0.3";
            collectBtn.disabled = true;
        }
    }

    if(d.newChips !== undefined) updateChips(d.newChips);
});

let isCrashing = false;
let currentMult = 1.0;
let crashInt;

// --- CRASH ---
function handleCrashAction() {
    const btn = document.getElementById('crash-action-btn');
    const bet = parseInt(document.getElementById('crash-bet').value);

    if (!isCrashing) {
        // BETフェーズ
        if (!bet || bet <= 0) return alert("賭け金を入れて！");
        socket.emit('crash_bet', { bet });
        btn.innerText = "WAITING...";
        btn.disabled = true;
    } else {
        // CASHOUTフェーズ（利確！）
        socket.emit('crash_cashout', { bet, multiplier: currentMult });
        stopCrashLocal("利確成功！");
    }
}

socket.on('crash_start', ({ bet, crashPoint }) => {
    isCrashing = true;
    currentMult = 1.0;
    const btn = document.getElementById('crash-action-btn');
    btn.disabled = false;
    btn.innerText = "CASH OUT"; // ここで利確ボタンに変わる
    btn.classList.add('btn-cashout');

    crashInt = setInterval(() => {
        currentMult += 0.01;
        document.getElementById('crash-multiplier').innerText = currentMult.toFixed(2) + "x";

        if (currentMult >= crashPoint) {
            stopCrashLocal("💥 CRASHED!");
        }
    }, 100);
});

function stopCrashLocal(msg) {
    clearInterval(crashInt);
    isCrashing = false;
    const btn = document.getElementById('crash-action-btn');
    btn.innerText = "BET";
    btn.classList.remove('btn-cashout');
    document.getElementById('crash-status').innerText = msg;
}

// --- ROULETTE ---
function betR(mode) {
    const bet = parseInt(document.getElementById('roulette-bet').value);
    let type = mode;
    if (mode === 'number') {
        const num = document.getElementById('roulette-num').value;
        if (num === "") return alert("数字を選んで！");
        type = "num_" + num;
    }
    socket.emit('roulette_bet', { bet, type });
    document.getElementById('roulette-ball').innerText = "🌀";
}

socket.on('roulette_result', (data) => {
    document.getElementById('roulette-ball').innerText = data.resultNumber;
    if (data.isWin) alert(`勝利！ ${data.payout}枚獲得！`);
});
    
// 7. ランキング（HTMLの id="rList" に合わせました）
socket.on('update_ranking', list => {
    const container = document.getElementById('rList');
    if (!container) return;
    container.innerHTML = list.map((u, i) => `
        <div style="border-bottom: 1px solid rgba(0,255,255,0.1); padding: 5px 0;">
            <span style="color:var(--accent2)">${i + 1}.</span> ${u.name} 
            <span style="float:right; color:#fcee0a;">${u.chips}</span>
        </div>
    `).join('');
});

// 8. カード描画（HTMLの .card-ui デザインに合わせました）
function renderCards(id, cards) {
    const el = document.getElementById(id);
    if (!el) return;
    el.innerHTML = cards.map(c => {
        if (c.rank === '?') return `<div class="card-ui back">?</div>`;
        const isRed = c.suit === '♥' || c.suit === '♦';
        return `<div class="card-ui ${isRed ? 'red' : ''}">${c.rank}${c.suit}</div>`;
    }).join('');
}

socket.on('chat_history', (msgs) => {
    const chatLog = document.getElementById('chat-log');
    if (!chatLog) return;
    chatLog.innerHTML = ""; 

    msgs.forEach(data => {
        const isMe = (data.userName === myName);
        
        const infoDiv = document.createElement('div');
        infoDiv.className = "msg-info";
        
        let nameLabel = data.userName;
        if (data.isDebtor) {
            nameLabel += ' <span style="color:#ff4d6a; font-weight:bold; margin-left:5px;">[債務者]</span>';
        }
        infoDiv.innerHTML = nameLabel;

        const msgDiv = document.createElement('div');
        msgDiv.className = isMe ? "msg-box msg-me" : "msg-box msg-other";
        msgDiv.textContent = data.message || "表示エラー"; 

        chatLog.appendChild(infoDiv);
        chatLog.appendChild(msgDiv);
    });
    chatLog.scrollTop = chatLog.scrollHeight;
});
    
</script>
</body>
</html>
